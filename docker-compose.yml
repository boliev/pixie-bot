services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pixie_bot
      POSTGRES_USER: pixie
      POSTGRES_PASSWORD: pixie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixie -d pixie_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
